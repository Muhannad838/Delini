name: delini
description: Delni - Hospital Indoor Navigation App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.1.0
  hive_ce: ^2.6.0
  hive_ce_flutter: ^2.1.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  uuid: ^4.3.3
  intl: ^0.20.2
  http: ^1.2.0
  image_picker: ^1.1.0
  speech_to_text: ^6.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_ce_generator: ^1.6.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/l10n/
